; Cardputer-Adv (Stamp-S3A / ESP32-S3FN8 / 8 MB flash, no PSRAM).
; Pin platform 6.7.0: arduino-esp32 v2.0.x ships Bluedroid BLE,
; which our ble_bridge.cpp targets. Platform >= 6.10 switches to
; arduino-esp32 v3.x + NimBLE and would require a bridge rewrite.
[env:m5stack-cardputer-adv]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions_8mb.csv
build_flags =
    -DESP32S3
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
; Phase 6: full firmware including the GIF character pipeline. The
; character_stub.cpp is no longer in the tree; character.cpp is the
; real AnimatedGIF + LittleFS implementation, sized for landscape
; 240x135 (left-column placement matching the ASCII buddy zone).
build_src_filter =
    -<*>
    +<main_adv.cpp>
    +<platform.cpp>
    +<input.cpp>
    +<buddy.cpp>
    +<buddies/>
    +<ble_bridge.cpp>
    +<character.cpp>
lib_deps =
    m5stack/M5Cardputer @ ^1.1.1
    bblanchon/ArduinoJson @ ^7.0.0
    bitbank2/AnimatedGIF @ ^2.1.1
