; M5Stack StickS3 (ESP32-S3-PICO-1-N8R8 / 8 MB flash / 8 MB Octal PSRAM).
; Pinned to platform 6.7.0 (arduino-esp32 v2.0.x + Bluedroid BLE) to
; match the parent Cardputer-Adv build and reuse ../src/ble_bridge.cpp
; verbatim. M5Unified 0.2.15+ supports both the StickS3 board enum and
; arduino-esp32 v2.0.x (verified in M5Unified's ArduinoBuild.yml CI).
[env:m5stack-sticks3]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
board_build.partitions = partitions_8mb.csv
board_build.arduino.memory_type = qio_opi
build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DSTICKS3_BUILD
    -I${PROJECT_DIR}/../src
; Source files live in two places:
;   StickS3/src/    - hardware shim for this board (main_stick, platform, input)
;   ../src/         - shared protocol, BLE, renderer, species (one tree,
;                     compiled into both the Cardputer-Adv and StickS3
;                     builds without modification).
; character.cpp is intentionally absent: the StickS3 has no microSD slot
; and this build does ASCII pets only.
build_src_filter =
    -<*>
    +<main_stick.cpp>
    +<platform.cpp>
    +<input.cpp>
    +<../../src/buddy.cpp>
    +<../../src/buddies/>
    +<../../src/ble_bridge.cpp>
; chain+ so LDF transitively scans headers like stats.h (which pulls in
; <Preferences.h> from the framework's built-in libraries) instead of
; stopping at the top-level project source includes.
lib_ldf_mode = chain+
lib_deps =
    m5stack/M5Unified @ ^0.2.15
    bblanchon/ArduinoJson @ ^7.0.0
